<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Joyería Artesanal</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="page">
    <div class="background"></div>

    <main class="card">
      <header class="card__header">
        <img src="image/profile.jpg" class="avatar" id="avatar" />

        <h1 class="card__title">Detallitos Puka</h1>
        <h3 class="card__title2">Joyas Artesanales con Historia</h3>

        <p class="card__subtitle">
          Piezas artesanales hechas a mano con piedras naturales
        </p>
      </header>

      <section class="links">
        <a
          href="https://www.instagram.com/detallitospuka.mx/"
          target="_blank"
          class="links__button links__button--primary"
        >
          Descubrir colección
        </a>

        <a
          href="https://wa.me/523521136194"
          target="_blank"
          class="links__button"
        >
          Pedir por WhatsApp
        </a>
        <a
          href="https://wa.me/523521136194?text=Me%20gustar%C3%ADa%20hacer%20una%20pieza%20personalizada%20de%20Joyer%C3%ADa"
          target="_blank"
          class="links__button links__button--highlight"
        >
          Diseñar pieza personalizada
        </a>
        <a
          href="https://www.tiktok.com/@detallitospuka.mx"
          target="_blank"
          class="links__button"
        >
          También en TikTok
        </a>
        <a href="#" class="links__button disabled"> Piezas para Grabar </a>

        <!-- <a href="#" class="links__button disabled">
          Piezas únicas disponibles hoy
        </a> -->
      </section>

      <footer class="card__footer">
        <p class="card__trust">
          Hecho a mano · Joyeria Artesanal · Producción limitada
        </p>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
